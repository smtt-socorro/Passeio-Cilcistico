services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smtt}
      POSTGRES_USER: ${POSTGRES_USER:-smtt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init/01_schema_public.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    profiles: ["runtime"]
    image: ${SMTT_APP_IMAGE:-wendellsales/bikesmtt:latest}
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-smtt}
      DB_USER: ${POSTGRES_USER:-smtt}
      DB_PASS: ${POSTGRES_PASSWORD:-changeme}
      DEBUG_MODE: ${DEBUG_MODE:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
